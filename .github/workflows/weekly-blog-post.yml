name: Weekly Blog Post

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      topic:
        description: "Override topic (optional, uses weekly rotation if empty)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (print only, do not save)"
        type: boolean
        required: false
        default: false

jobs:
  generate:
    name: Generate & publish blog post
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generate blog post
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            ARGS="--topic=${{ github.event.inputs.topic }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          npm run blog:generate -- $ARGS
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
