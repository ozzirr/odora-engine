name: Weekly Blog Post

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      index:
        description: "Topic index to generate (0-24, leave empty for weekly rotation)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (print only, do not save)"
        type: boolean
        required: false
        default: false
      no_image:
        description: "Skip AI image generation"
        type: boolean
        required: false
        default: false

jobs:
  generate:
    name: Generate & publish blog post
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generate blog post
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.index }}" ]; then
            ARGS="--index=${{ github.event.inputs.index }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.no_image }}" = "true" ]; then
            ARGS="$ARGS --no-image"
          fi
          npm run blog:generate -- $ARGS
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          ODORA_REVALIDATE_TOKEN: ${{ secrets.ODORA_REVALIDATE_TOKEN }}
          ODORA_REVALIDATE_URL: https://www.odora.it/api/revalidate
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
