<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomad Parfums</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(to right, #74c1e1, #335dff);
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            color: #333;
        }
        .filter {
            margin: 20px 0;
        }
        input, select {
            padding: 10px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Nomad Parfums</h1>
    <div class="filter">
        <input type="text" placeholder="Cerca una fragranza..." />
        <select>
            <option>Uomo</option>
            <option>Donna</option>
            <option>Unisex</option>
        </select>
        <button>Cerca</button>
    </div>
    <div id="fragrance-list">
        <h2>Lista delle Fragranze</h2>
        <p>Qui verrà visualizzato il database delle fragranze.</p>
    </div>
</div>

</body>
</html>
